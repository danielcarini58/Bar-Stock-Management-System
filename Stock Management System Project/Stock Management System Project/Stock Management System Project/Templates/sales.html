<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
    <title>Sales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">

</head>

<body>

    <div id="sidebarContainer"></div>
    <header>
        <h1 id="pageTitle">Sales</h1>
    </header>

    <div class="main-container">

        <!-- Enter rest of content for sales here-->
        <p id="pageDescription" class="text-muted fs-6 mb-4">
            Welcome to your Sales section! Here you can manage your sales records, track item performance, and monitor
            revenue.
        </p>
        <h5>Add New Sale</h5>
        <form id="addSaleForm" class="row g-3 mb-4">
            <div class="col-md-3">
                <select id="itemSelect" class="form-control" required>
                    <option value="">Select Item</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="quantity" placeholder="Quantity" min="1" required>
                <p>Total Cost: <strong id="calculatedCostDisplay">£0.00</strong></p>
            </div>
            <div class="col-md-3">
                <input type="date" class="form-control" id="sale_date" placeholder="Date" required>
            </div>
            <div class="col-md-3">
                <input type="text" id="calculatedCost" readonly>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary">Add Sale</button>
            </div>

        </form>
        <table class="table table-sales">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Date</th>
                    <th>Cost</th>
                </tr>
            </thead>
            <tbody id="salesTable">

            </tbody>
        </table>
        <div id ="aiBubble">💬</div>
        <div id ="aiChatBox">
            <button id="closeAiChat">✕</button>
            <div id="aiMessages"></div>

            <input type="text" id="aiInput" placeholder="Ask about sales, stock..." />  
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sales.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ai.js') }}"></script>
</body>

</html>
